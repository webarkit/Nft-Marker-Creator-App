name: Build and Test

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
      # Python package releases (python-v*) are a separate stream; they must not
      # rebuild the Node/WASM app or create a GitHub release. Node releases use
      # plain SemVer tags (e.g. 0.4.0).
      - '!python-v*'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: get release version
        id: pre-step
        shell: bash
        run: echo "release-version=$(echo ${GITHUB_REF:10})" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}

      - name: Cache npm
        uses: actions/cache@v6
        id: npm-cache # use this to check for `cache-hit` ==> if: steps.npm-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Clone git submodule (WebARKitLib)
        run: git submodule update --init

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: |
          docker run -dit --name emscripten-nft-marker-creator-app -v $(pwd):/src emscripten/emsdk:4.0.19 bash
          docker exec emscripten-nft-marker-creator-app npm run build-local

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: |
            build
            !build/libar.o

      - name: Commit changes
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actions
          message: new build files from action
          add: |
            - build/NftMarkerCreator.min.js
            - build/NftMarkerCreator_ES6_wasm.js
            - build/NftMarkerCreator_wasm.js
            - build/NftMarkerCreator_wasm.thread.js
            - src/NFTMarkerCreator.js

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/NftMarkerCreator.min.js
            build/NftMarkerCreator_ES6_wasm.js
            build/NftMarkerCreator_wasm.js
            build/NftMarkerCreator_wasm.thread.js
            src/NFTMarkerCreator.js