name: Publish to DockerHub with a verstion-tag
# Trigger on the tag push (the same event that drives build.yml), not on
# `release: published`. A release created by build.yml uses the default
# GITHUB_TOKEN, and GitHub does not fire `release` events for token-created
# releases, so this workflow never ran (issue #10). The tag push is a normal
# event we control, so it triggers reliably.
on:
  push:
    tags:
      - '**'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: vars
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
      - id: pre-step
        shell: bash
        run: |
          version=""
          if [ "${GITHUB_REF}" != "" ]; then
            version="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$version" ] && [ "${{ github.event.release.tag_name }}" != "" ]; then
            version="${{ github.event.release.tag_name }}"
          fi
          echo "release-version=$version" >> "$GITHUB_OUTPUT"
      - name: Publish to Registry with version-tag
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: webarkit/nft-marker-creator-app
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          tags: latest,${{ steps.pre-step.outputs.release-version }}